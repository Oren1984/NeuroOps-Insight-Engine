# docker/docker-compose.yml
# This docker-compose file defines two services:
# 1. ai-business-intelligence-agent: This is the main application built from the Dockerfile in the parent directory. 
# It exposes port 8501 and mounts the data directory for persistent storage. 
# It also uses environment variables from the .env file in the parent directory.

# 2. n8n: This is an automation tool that simulates outgoing automation. 
# It exposes port 5678 and uses a named volume for persistent storage of its data. 
# It is configured to restart unless stopped.

services:
  ai-business-intelligence-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai-business-intelligence-agent
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
    env_file:
      - ../.env
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: ai-bi-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data:
