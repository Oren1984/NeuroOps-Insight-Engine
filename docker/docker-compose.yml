services:
  ai-business-intelligence-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai-business-intelligence-agent
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
    env_file:
      - ../.env
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: ai-bi-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data:
